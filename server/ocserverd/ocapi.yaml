# oapi-codegen config for the ocserverd REST surface.
# Input: spec/openapi.json (wire SSOT) downconverted 3.1→3.0 by bin/gen-ocapi —
# always regenerate THROUGH that script, never by hand-running oapi-codegen
# (the tool version is pinned there; the output ocapi_gen.go is committed).
package: main
generate:
  models: true
  std-http-server: true
output: ocapi_gen.go
